<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Love Pages For My Brownie ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    position:relative;
}

/* COMMON PAGES */
.page{
    display:none;
    width:100%;
    height:100vh;
    min-height:100dvh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    color:white;
    padding:20px;
    position:relative;
    animation:fade .8s ease;
}

.page.active{
    display:flex;
}

@keyframes fade{
    from{
        opacity:0;
        transform:scale(1.05);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* TEXT */
h1{
    font-size:32px;
    line-height:1.3;
    margin-bottom:15px;
    text-shadow:0 0 12px white;
}

p{
    font-size:18px;
    line-height:1.6;
    margin-bottom:22px;
}

/* BUTTON */
button{
    border:none;
    outline:none;
    padding:14px 24px;
    border-radius:50px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    min-width:220px;
    transition:.3s;
}

button:active{
    transform:scale(.95);
}

/* BACKGROUNDS */
#page1{
    background:linear-gradient(135deg,#ff5f9e,#ff9a9e,#fad0c4);
}

#page2{
    background:linear-gradient(135deg,#6a11cb,#2575fc,#00c6ff);
}

#page3{
    background:linear-gradient(135deg,#ff4b6e,#ff6a88,#ff99ac);
    overflow:hidden;
}

/* IMAGE */
.couple-img{
    width:72vw;
    max-width:260px;
    height:42vh;
    max-height:320px;
    object-fit:cover;
    border-radius:22px;
    border:4px solid white;
    box-shadow:0 0 20px rgba(255,255,255,.8);
    animation:floatImg 2s infinite alternate;
}

@keyframes floatImg{
    from{transform:translateY(0);}
    to{transform:translateY(-10px);}
}

/* PAGE 2 TEXT */
.bigText{
    margin-top:16px;
    font-size:34px;
    line-height:1.4;
    font-weight:bold;
    text-shadow:0 0 14px white;
    animation:pulse 1s infinite alternate;
}

@keyframes pulse{
    from{transform:scale(1);}
    to{transform:scale(1.05);}
}

/* PAGE 3 CENTER */
.love-center{
    font-size:38px;
    font-weight:bold;
    line-height:1.4;
    z-index:5;
    text-shadow:0 0 16px white;
    animation:centerPop 1.2s infinite alternate;
    padding:0 10px;
}

@keyframes centerPop{
    from{transform:scale(1);}
    to{transform:scale(1.06);}
}

/* MOVING LOVE TEXT */
.flying-love{
    position:absolute;
    font-size:16px;
    font-weight:bold;
    color:white;
    white-space:nowrap;
    text-shadow:0 0 10px white;
    animation:flyLove 5s linear forwards;
}

@keyframes flyLove{
    0%{
        transform:translate(-180px,80px) rotate(0deg) scale(.4);
        opacity:0;
    }
    15%{
        opacity:1;
    }
    100%{
        transform:translate(115vw,-105vh) rotate(360deg) scale(1.3);
        opacity:0;
    }
}

/* HEARTS */
.heart{
    position:absolute;
    color:white;
    animation:floatHeart 5s linear forwards;
}

@keyframes floatHeart{
    0%{
        transform:translateY(100vh) scale(.5);
        opacity:1;
    }
    100%{
        transform:translateY(-10vh) scale(1.5);
        opacity:0;
    }
}

/* SMALL DEVICES */
@media(max-width:380px){

    h1{
        font-size:28px;
    }

    p{
        font-size:16px;
    }

    .bigText{
        font-size:28px;
    }

    .love-center{
        font-size:32px;
    }

    button{
        min-width:200px;
        font-size:16px;
    }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
    <h1>💖 My Sweet Wife 💖</h1>

    <p>
        I know you're angry with me...<br>
        But you are my everything ❤️
    </p>

    <button onclick="goPage2()">Click If You Love Me 😘</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRIo_9MKjeqBBGXjP_8BBUyhyx-ukHKVxCRKQ&s" class="couple-img">

    <div class="bigText">❤️ Love You My Brownie ❤️</div>

    <button onclick="goPage3()">Reply 💌</button>

</div>

<!-- PAGE 3 -->
<div class="page" id="page3">

    <div class="love-center">
        💗 I KNOW 
        YOU LOVE ME 💗
    </div>

</div>

<script>
let page3Started = false;

function hideAll(){
    document.querySelectorAll(".page").forEach(page=>{
        page.classList.remove("active");
    });
}

function goPage2(){
    hideAll();
    document.getElementById("page2").classList.add("active");
    createHearts(35);
}

function goPage3(){
    hideAll();
    document.getElementById("page3").classList.add("active");
    createHearts(80);

    if(page3Started) return;
    page3Started = true;

    setInterval(()=>{
        createFlyingLove();
    },220);
}

function createFlyingLove(){
    let txt = document.createElement("div");
    txt.className = "flying-love";
    txt.innerHTML = "💗 I Know You Love Me 💗";

    txt.style.left = Math.random()*75 + "vw";
    txt.style.top = Math.random()*88 + "vh";
    txt.style.fontSize = (14 + Math.random()*10) + "px";

    document.getElementById("page3").appendChild(txt);

    setTimeout(()=>{
        txt.remove();
    },5000);
}

function createHearts(num){
    for(let i=0;i<num;i++){

        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "🤍";

        heart.style.left = Math.random()*100 + "vw";
        heart.style.fontSize = (14 + Math.random()*20) + "px";
        heart.style.animationDuration = (3 + Math.random()*2) + "s";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },5000);
    }
}

setInterval(()=>{
    createHearts(3);
},1000);
</script>

</body>
</html>
